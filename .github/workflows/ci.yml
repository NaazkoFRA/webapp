name: DevSecOps Pipeline (Cloud)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: npm test -- --coverage --coverageReporters=lcov --coverageReporters=text
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  sonar-check:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: npm test -- --coverage --coverageReporters=lcov
      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  build-image:
    needs: [sonar-check, dependency-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t webapp:latest .

  container-scan:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t webapp:latest .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'webapp:latest'
          severity: 'CRITICAL'
          exit-code: '1'

        #CI?CD
